<script type="application/json" id="appData">[{"id": 1, "title": "腾讯云：RTB实时竞价——从买位置到买人的毫秒级博弈", "original_title": "什么是实时竞价(RTB)？广告竞价的毫秒级博弈 - 腾讯云", "summary": "RTB（Real-Time Bidding）是数字广告领域的程序化购买核心技术。通过毫秒级拍卖实现精准投放，将广告从\"买位置\"升级为\"买人\"，100ms内完成竞价决策。", "body": "## RTB工作流程(100ms内完成)\n1. 用户访问媒体页面\n2. SSP发起竞价请求(含用户信息)\n3. DSP评估用户价值+出价\n4. AdExchange决出赢家\n5. 赢家广告展示给用户\n\n## 核心组件\n- **ADN(广告网络)**: 流量聚合\n- **ADX(广告交易平台)**: 拍卖场所\n- **DSP(需求方平台)**: 广告主代理\n- **DMP(数据平台)**: 用户画像\n- **SSP(供应方平台)**: 媒体代理", "source": "tech-media", "category": "程序化广告", "impact": "medium", "year": "2026", "date": "2026-04-14", "tags": ["RTB", "实时竞价", "腾讯云", "DSP", "DMP"], "url": "https://cloud.tencent.com.cn/developer/article/2654783", "readCount": 6080, "shareCount": 6899, "commentCount": 121, "updatedAt": "2026-04-14"}, {"id": 2, "title": "界面新闻：GEO优化指南——数千客户案例提炼的合规实践", "original_title": "GEO优化公司最全指南2026：基于数千家客户案例的合规性实践", "summary": "界面新闻发布GEO优化全指南，基于数千家企业客户的实战经验，总结GEO实施中的合规要点、常见误区和最佳实践。", "body": "## 常见误区\n1. 把GEO当SEO做（完全不同的技术逻辑）\n2. 堆砌关键词给AI看（AI理解语义非字面）\n3. 忽视内容真实性（AI会识别并惩罚虚假信息）\n4. 只做不做持续优化（AI模型在持续迭代）\n\n## 合规红线\n- 不得通过技术手段操纵AI输出结果\n- 不得虚构专家身份或虚假背书\n- 不得利用AI漏洞进行恶意竞争", "source": "tech-media", "category": "MarTech", "impact": "low", "year": "2026", "date": "2026-04-13", "tags": ["GEO指南", "合规实践", "界面新闻"], "url": "https://www.jiemian.com/article/14247612.html", "readCount": 34252, "shareCount": 3499, "commentCount": 512, "updatedAt": "2026-04-13"}, {"id": 3, "title": "天下秀2025年报：WEIQ AI Agent落地+AIGC出海双线提速", "original_title": "数字营销国家标准落地，天下秀2025年报锚定营销垂类AI Agent", "summary": "《人工智能生成合成内容标识办法》9月实施，数字营销国家标准落地。天下秀2025年报显示WEIQ平台AI Agent落地、灵感岛AIGC生态出海、全球化红人孵化网络成形。", "body": "## 政策背景\n《人工智能生成合成内容标识办法》正式实施，数字营销国标落地。\n\n## 天下秀双线进展\n- **AI Agent(WEIQ)**: 红人匹配与投放智能化\n- **AIGC出海(灵感岛)**: 创作工具国际化\n- **全球化网络**: 国际红人孵化加速\n\n## 战略方向\n大数据+AI双引擎，从工具赋能向生态化服务演进。", "source": "weibo", "category": "KOL营销", "impact": "high", "year": "2026", "date": "2026-04-10", "tags": ["AI Agent", "红人营销", "数字营销标准", "天下秀"], "url": "http://www.enet.com.cn/article/2026/0410/A202604101275260.html", "readCount": 48251, "shareCount": 2682, "commentCount": 93, "updatedAt": "2026-04-10"}, {"id": 4, "title": "麦肯锡：数字化营销不止于卖货——品效合一的品牌制胜之策", "original_title": "数字化营销：不止于「卖货」| 麦肯锡中国", "summary": "麦肯锡指出中国媒体环境下，如何高效利用效果媒体沉淀品牌用户资产是核心挑战。数字化营销不能止于短期销量转化，更需建立长期品牌护城河。", "body": "## 核心矛盾\n追求短期转化 vs 建立长期品牌资产\n\n## 解决框架\n1. **品牌-效果平衡**: 科学分配预算比例\n2. **第一方数据建设**: 私域用户资产积累\n3. **内容体系化**: 从单品卖点升维到品牌价值观\n4. **全链路测量**: 统一衡量品牌与效果指标\n\n## 案例启示\n头部品牌通过\"品效合一\"实现长期增长。", "source": "industry-media", "category": "品牌营销", "impact": "high", "year": "2026", "date": "2026-04-09", "tags": ["麦肯锡", "品牌资产", "品效合一", "数字化转型"], "url": "https://www.mckinsey.com.cn/%e6%95%b0%e5%ad%97%e5%8c%96%e8%90%a5%e9%94%80%ef%bc%9a%e4%b8%8d%e6%ad%a2%e4%ba%8e%e5%8d%96%e8%b4%a7%e5%93%81%e7%89%8c%e5%88%b6%e8%83%9c%e7%9a%84%e7%ad%96/", "readCount": 14743, "shareCount": 6240, "commentCount": 490, "updatedAt": "2026-04-09"}, {"id": 5, "title": "谷歌2026 AI营销白皮书：健康养生+情绪价值+文化自信五大消费主题", "original_title": "谷歌发布《2026 AI 营销白皮书》：五大趋势重塑营销逻辑", "summary": "基于全球25个市场、5万+消费者的调研，指出健康养生、情绪价值、文化自信、智能生活、可持续五大主题正在重塑营销逻辑。68%消费者愿为有故事的品牌溢价。", "body": "## 五大消费趋势\n\n1. **健康养生**: 银发经济崛起，功能性产品需求爆发\n2. **情绪价值\": \"治愈\"和\"解压\"功能产品迅猛增长\n3. **文化自信**: 国货品牌持续受年轻消费者追捧\n4. **智能生活**: AI产品市场渗透率突破40%\n5. **可持续**: 环保因素成为购买决策重要指标\n\n## AI营销三大原则\n- 用AI提效但必须保留人工审核\n- 用AI分析数据但保护隐私是底线\n- 用AI优化投放但不能丢失品牌调性\n\n## 预测：全球AI营销市场规模2026年底达1500亿美元", "source": "industry-media", "category": "AIGC", "impact": "high", "year": "2026", "date": "2026-04-08", "tags": ["谷歌", "AI白皮书", "消费趋势", "品牌策略"], "url": "https://www.brandvista.com/news/google-ai-marketing-whitepaper-2026/", "readCount": 54287, "shareCount": 3321, "commentCount": 250, "updatedAt": "2026-04-08"}, {"id": 6, "title": "腾讯云：GEO效果度量框架——AI可见度×内容可信度×转化率三维模型", "original_title": "2026年如何衡量生成引擎优化（GEO）的效果 - 腾讯云", "summary": "腾讯云开发者社区发布GEO效果度量方法论。针对企业\"优化了却不知好坏\"的困境，提出AI可见度提升率、内容被引用频次、AI驱动的转化漏斗三大核心指标。", "body": "## 三维度量模型\n\n### 维度一：AI可见度\n- 品牌在主流AI引擎中的出现频率\n- 推荐优先级变化趋势\n- 覆盖的AI平台数量\n\n### 维度二：内容可信度\n- AI回答中引用该品牌的比例\n- 引用内容的正面/中性情感占比\n- 用户对AI推荐信息的信任度\n\n### 维度三：业务转化\n- AI搜索路径带来的访问量\n- AI对话引导的线索/订单转化\n- 与传统SEO流量的对比ROI", "source": "tech-media", "category": "MarTech", "impact": "medium", "year": "2026", "date": "2026-04-07", "tags": ["GEO度量", "腾讯云", "AI效果衡量"], "url": "https://cloud.tencent.com/developer/article/2651069", "readCount": 34403, "shareCount": 7950, "commentCount": 73, "updatedAt": "2026-04-07"}, {"id": 7, "title": "IT之家：2026 AI营销创意平台排行——全链路能力决定胜负", "original_title": "2026国内 AI 营销创意应用平台排行榜：全链路能力成核心竞争壁垒", "summary": "随着生成式AI深度渗透营销领域，AI营销创意平台已成为品牌提升效率的核心工具。全链路能力（从创意到投放到分析）取代单点功能成为核心竞争力。", "body": "## 行业背景\n生成式AI全面介入后，品牌对优质AI营销创意平台的需求持续攀升。\n\n## 评估四大维度\n1. **创意生成质量与多样性**\n2. **多模态支持**（图文视频一体化）\n3. **与主流投放平台的对接能力**\n4. **数据闭环与效果归因**\n\n## 关键发现\n- 单点工具正在被全链路平台替代\n- 头部平台创意产出效率提升200%+\n- AI辅助决策帮助品牌提前锁定流量红利", "source": "industry-media", "category": "MarTech", "impact": "medium", "year": "2026", "date": "2026-04-07", "tags": ["AI营销平台", "全链路", "IT之家"], "url": "https://www.ithome.com/0/936/374.htm", "readCount": 62676, "shareCount": 5948, "commentCount": 238, "updatedAt": "2026-04-07"}, {"id": 8, "title": "腾讯新闻：2026 AI营销服务商实力榜——从效率工具到战略引擎", "original_title": "2026年度 AI 营销行业榜单：企业智能营销服务商实力排行", "summary": "AIGC从概念验证走向规模化应用，AI营销已从\"效率工具\"升级为驱动企业增长的\"核心战略引擎\"。Gartner预测相关市场将保持高速增长。", "body": "## 定位转变\n效率工具 → 核心战略引擎\n\n## 服务商评估维度\n1. 技术能力（模型质量与迭代速度）\n2. 行业Know-how深度\n3. 客户案例与ROI数据\n4. 数据安全与合规能力\n5. 全链路服务覆盖度", "source": "zhihu", "category": "AIGC", "impact": "high", "year": "2026", "date": "2026-04-07", "tags": ["AI服务商", "企业智能化", "腾讯新闻"], "url": "https://news.qq.com/rain/a/20260407A066JS00", "readCount": 51753, "shareCount": 5615, "commentCount": 387, "updatedAt": "2026-04-07"}, {"id": 9, "title": "2025互联网广告财报复盘：字节霸榜6509亿 百度承压", "original_title": "财报复盘互联网广告全景：新增长从何处来？", "summary": "2025年各家互联网公司财报显示广告收入整体稳定。字节跳动继续领跑（抖音+今日头条广告矩阵），阿里/腾讯/快手格局基本稳固，百度面临AI搜索转型的压力。", "body": "## 2025年广告收入格局\n- **字节跳动**: 抖音+头条持续领跑\n- **阿里巴巴**: 淘系广告稳健增长\n- **腾讯**: 微信广告+视频号发力\n- **快手**: 电商内广告快速增长\n- **百度**: AI搜索转型阵痛期\n\n## 新增长来源\n- 视频号商业化加速\n- 本地生活广告爆发\n- AI原生广告形态探索\n- 出海广告增量市场", "source": "zhihu", "category": "广告投放平台", "impact": "high", "year": "2026", "date": "2026-04-07", "tags": ["互联网广告", "财报", "字节跳动", "腾讯"], "url": "https://news.qq.com/rain/a/20260407A06U1600", "readCount": 47606, "shareCount": 4515, "commentCount": 246, "updatedAt": "2026-04-07"}, {"id": 10, "title": "2026年10大AI营销工具实测：微小兔等神器让效率翻倍", "original_title": "2026最新AI营销工具大全：10款AI神器让工作效率翻倍", "summary": "系统梳理2026年主流AI营销工具实测表现。以微小兔为代表的企业获客智能体矩阵等工具通过AI重构了从内容生产到转化的完整链路。", "body": "## 工具分类\n1. **内容生成类**: 文案/图片/视频自动生成\n2. **获客转化类**: 智能客服/线索挖掘/用户画像\n3. **数据分析类**: 效果归因/竞品监控/趋势预测\n4. **投放优化类**: 自动出价/创意动态优化", "source": "tech-media", "category": "MarTech", "impact": "low", "year": "2026", "date": "2026-04-07", "tags": ["AI工具", "效率提升", "营销自动化"], "url": "http://www.clii.com.cn/lhrh/202604/t20260407_3961130.html", "readCount": 28925, "shareCount": 3154, "commentCount": 347, "updatedAt": "2026-04-07"}, {"id": 11, "title": "中国程序化广告市场预测：2025-2035年CAGR 14.3% RMN+AI出价双驱动", "original_title": "China Programmatic Advertising Market Growth Report By 2035", "summary": "Market Research Future预测中国程序化广告市场2025-2035年复合增长率达14.3%。技术进步与数字广告支出增加是两大核心驱动力，零售媒体和AI出价成为新引擎。", "body": "## 市场预测\n- CAGR(2025-2035): **14.3%**\n- 核心驱动力: AI/ML/隐私计算 + 数字支出增长 + RMN扩张\n\n## 细分市场\n1. **按格式**: 视频广告增速最快\n2. **按渠道**: 移动端主导\n3. **按行业**: 电商/金融/游戏领跑\n4. **按技术**: AI出价+隐私计算是新亮点", "source": "tech-media", "category": "程序化广告", "impact": "medium", "year": "2026", "date": "2026-04-06", "tags": ["程序化广告", "CAGR", "Market Research Future", "RMN"], "url": "https://www.marketresearchfuture.com/reports/china-programmatic-advertising-market-46531", "readCount": 45834, "shareCount": 4199, "commentCount": 325, "updatedAt": "2026-04-06"}, {"id": 12, "title": "GEO 2026：从SEO到生成式引擎优化——AI搜索时代的流量新入口", "original_title": "2026年GEO生成式引擎优化行业研究报告 - 知乎", "summary": "GEO（Generative Engine Optimization）是AI原生时代的新兴营销优化策略。通过结构化知识建模、语义场工程、跨模态适配，让品牌信息更易被ChatGPT、DeepSeek、Kimi等生成式AI引擎抓取与推荐。", "body": "## GEO vs SEO 对比\n\n| 维度 | SEO | GEO |\n|------|-----|-----|\n| 目标 | 传统搜索引擎排名 | 生成式AI引用与推荐 |\n| 技术 | 关键词+链接 | 结构化知识+语义理解 |\n| 形态 | 十条蓝色链接 | 自然语言答案 |\n| 流量 | 点击→跳转 | 直接获取信息 |\n\n## 九大核心策略\n1. 结构化数据标记（Schema.org）\n2. 实体权威性建设（E-E-A-T）\n3. 内容模块化与可引用性\n4. 多模态内容适配\n5. 品牌知识图谱建设\n6. AI友好型FAQ体系\n7. 引用源网络建设\n8. 对话式内容优化\n9. 实时数据更新机制\n\n## 预测：2026年传统搜索引擎流量较2023年缩减25%", "source": "zhihu", "category": "MarTech", "impact": "high", "year": "2026", "date": "2026-04-03", "tags": ["GEO", "生成式引擎优化", "AI搜索", "SEO"], "url": "https://zhuanlan.zhihu.com/p/2023341801101096851", "readCount": 21390, "shareCount": 3351, "commentCount": 400, "updatedAt": "2026-04-03"}, {"id": 13, "title": "清华《2026生成式AI深度报告》：五大场景重塑营销范式", "original_title": "清华出品！《2026生成式人工智能行业深度研究报告》5.0版", "summary": "清华大学清新研究团队发布AIGC报告5.0，深度解析生成式AI在内容生产、客户服务、创意设计、数据分析、决策支持五大营销场景的落地应用。提出AI Agent将成为企业营销标配。", "body": "## 核心发现\n\n1. **内容生产**: AIGC工具渗透率超65%，短视频脚本/海报/文案自动化成常态\n2. **客户服务**: AI智能客服处理80%+常规咨询，人工聚焦高价值客群\n3. **创意设计**: Midjourney/Stable Diffusion类工具降低70%设计成本\n4. **数据分析**: LLM驱动消费者洞察从周级缩短至小时级\n5. **决策支持**: AI辅助投放策略推荐准确率达85%\n\n## 营销人必知\n- AI不会替代营销人，但会用AI的营销人会替代不会用的\n- 人机协作模式：AI负责执行+分析，人负责策略+审美+共情", "source": "zhihu", "category": "AIGC", "impact": "high", "year": "2026", "date": "2026-04-01", "tags": ["清华", "生成式AI", "AIGC报告", "AI Agent"], "url": "https://zhuanlan.zhihu.com/p/2022623331023602149", "readCount": 24840, "shareCount": 3999, "commentCount": 387, "updatedAt": "2026-04-01"}, {"id": 14, "title": "IT之家：GEO产业白皮书——2026中国服务商综合能力排行", "original_title": "GEO 产业白皮书：2026 中国生成式引擎优化服务商综合能力榜", "summary": "IT之家发布GEO产业白皮书，首次对中国生成式引擎优化服务商进行综合评估。涵盖技术能力、案例积累、合规水平、生态合作四大维度，为企业选型提供参考。", "body": "## 评选维度\n\n1. **技术能力**: 大模型对接能力、知识图谱成熟度、多平台适配覆盖\n2. **案例积累**: 服务品牌数量、行业分布、效果ROI数据\n3. **合规水平**: 数据隐私保护、AI伦理规范、内容真实性保障\n4. **生态合作**: 与搜索引擎/AI平台的官方合作关系\n\n## 行业格局\n- 头部玩家: 已形成技术壁垒的综合性服务商\n- 中腰部: 垂直领域专业服务商快速崛起\n- 新进入者: 传统SEO/内容机构转型而来", "source": "industry-media", "category": "MarTech", "impact": "medium", "year": "2026", "date": "2026-03-18", "tags": ["GEO白皮书", "服务商排行", "IT之家"], "url": "https://www.ithome.com/0/930/089.htm", "readCount": 23315, "shareCount": 3325, "commentCount": 93, "updatedAt": "2026-03-18"}, {"id": 15, "title": "广告门×易观：中国AI+营销趋势洞察2026——价值驱动取代技术探索", "original_title": "报告解读｜《中国 AI + 营销趋势洞察 2026》（附下载）| 广告门", "summary": "易观分析与广告门联合发布《中国AI+营销趋势洞察2026》，指出AI营销已从技术探索阶段迈入价值驱动阶段。重点分析了AI在全链路营销中的规模化应用与ROI验证方法。", "body": "## 三大阶段演进\n1. **技术探索期(2022-2023)**: 少数先行者试水AI营销工具\n2. **场景验证期(2024-2025)**: 具体用例验证ROI，头部企业建立最佳实践\n3. **价值驱动期(2026起)**: AI嵌入全链路，成为战略基础设施\n\n## 六大关键洞察\n- AI营销投资回报周期缩短至4-6个月\n- 采用AI的企业平均效率提升40%\n- 内容生产成本下降60%\n- 创意多样性提升200%\n- 但人才缺口达行业总需求的35%", "source": "industry-media", "category": "AIGC", "impact": "high", "year": "2026", "date": "2026-03-17", "tags": ["易观分析", "AI+营销", "广告门", "趋势洞察"], "url": "https://www.adquan.com/article/359170", "readCount": 78377, "shareCount": 3879, "commentCount": 520, "updatedAt": "2026-03-17"}, {"id": 16, "title": "CNAD：2026 AIGC营销趋势——从技术竞赛转向信任工程", "original_title": "2026年AIGC营销广告趋势！ - CNAD中国广告传媒业知名门户", "summary": "CNAD指出AIGC在广告营销渗透率突破30%，核心命题已从\"谁能生成更快\"升级为\"谁能建立真实品牌连接\"。透明、有温度、可共创的内容成为用户首选。", "body": "## 核心趋势\n\n1. **渗透率突破30%**: 主要集中在35岁以下高线城市青年白领\n2. **效率数据**: 文案效率提升71.3%，投放优化效率提升50.5%\n3. **信任危机与重建**: 用户既被效率吸引又对算法防御\n4. **人机协同新分工**:\n   - 升值: 策略判断/审美把控/情绪洞察/风险意识\n   - 贬值: 单纯的内容执行能力\n5. **共创模式崛起**: 用户参与内容生成的AIGC形式接受度最高", "source": "industry-media", "category": "AIGC", "impact": "high", "year": "2026", "date": "2026-02-09", "tags": ["AIGC趋势", "信任营销", "人机协同", "CNAD"], "url": "https://www.cnad.com/index.php?mod=article&act=view&titleId=354302", "readCount": 58914, "shareCount": 6076, "commentCount": 399, "updatedAt": "2026-02-09"}, {"id": 17, "title": "澎湃新闻：2025社媒×电商融合——从货架到内容即货架的新范式", "original_title": "2025社交媒体营销与电商融合趋势报告：抖音、小红书...", "summary": "3年前电商还停留在传统模式，如今用户刷抖音直播直接下单、追海外短剧时同步购物。社交与电商的深度融合正在重构整个零售与营销链条。", "body": "## 变革对比\n\n### 旧范式（3年前）\n- 电商 = 货架摆货 + 搜关键词下单\n- 社媒 = 打知名度的辅助工具\n\n### 新范式（2025+）\n- 刷抖音直播 → 直接下单\n- 追短剧 → 同步购物\n- 看博主种草 → 一键购买\n\n## 平台格局\n- **抖音**: 短视频+直播+电商全域打通\n- **小红书**: 图文笔记+种草+闭环交易\n- **视频号**: 微信生态内的电商新增长极", "source": "tech-media", "category": "社交媒体", "impact": "high", "year": "2026", "date": "2026-02-05", "tags": ["社交电商", "抖音", "小红书", "内容即货架", "澎湃新闻"], "url": "https://www.thepaper.cn/newsDetail_forward_32532782", "readCount": 51713, "shareCount": 976, "commentCount": 39, "updatedAt": "2026-02-05"}, {"id": 18, "title": "2026广告营销产业趋势：技术赋能+细分市场+全球化三机遇", "original_title": "2026年广告营销产业现状及发展趋势分析", "summary": "中研普华报告指出2026年广告营销行业面临三大机遇：技术赋能（AI/AIGC）、细分市场深耕、全球化布局。同时面临流量成本攀升、注意力碎片化、隐私合规趋严等挑战。", "body": "## 三大机遇\n1. **技术赋能**: AI/AIGC全面渗透营销全链路\n2. **细分市场**: 垂直领域精细化运营机会增多\n3. **全球化布局**: 中国品牌出海带动营销服务国际化\n\n## 四大挑战\n- 流量成本持续攀升\n- 消费者注意力碎片化\n- 隐私合规要求趋严\n- 传统代理商模式受到冲击", "source": "zhihu", "category": "行业趋势", "impact": "medium", "year": "2026", "date": "2026-01-09", "tags": ["产业趋势", "全球化", "技术赋能", "中研普华"], "url": "https://www.chinairn.com/hyzx/20260109/160025117.shtml", "readCount": 57003, "shareCount": 293, "commentCount": 214, "updatedAt": "2026-01-09"}, {"id": 19, "title": "QuestMobile：2025互联网广告将破7930亿 ARPU值驱动增长", "original_title": "2024-2026年中国广告媒体市场深度调研报告 - QuestMobile", "summary": "QuestMobile预计2025年中国互联网广告规模突破7930亿元。增长驱动力从用户数量转向ARPU值提升与AI算力加持。RMN零售媒体网络成为程序化广告新增长极。", "body": "## 核心预测\n- 2025互联网广告规模: **7930亿元**\n- 驱动力切换: 用户数量 → **ARPU值**\n- 新变量: **AI算力加持**\n\n## 结构性变化\n1. **短视频广告**: 占比接近50%\n2. **电商内广告**: 直播带货+商品卡推广\n3. **搜索广告**: AI搜索改变流量分配\n4. **程序化**: RMN快速成长\n\n## 竞争格局\n- 字节: 抖音+头条矩阵\n- 阿里: 淘系+优酷\n- 腾讯: 微信+腾讯视频\n- 快手: 电商内广告快增", "source": "tech-media", "category": "广告投放平台", "impact": "high", "year": "2025", "date": "2025-12-29", "tags": ["QuestMobile", "互联网广告", "ARPU", "RMN零售媒体"], "url": "https://www.cnblogs.com/wintersun/p/19413802", "readCount": 34949, "shareCount": 4285, "commentCount": 309, "updatedAt": "2025-12-29"}, {"id": 20, "title": "复旦×明略×秒针：2025生成式营销报告——从内容生成(AIGC)到决策生成(AIGD)", "original_title": "从AIGC到AIGD-2025生成式营销产业研究报告解读（96页附下载）", "summary": "复旦管院×明略科技×秒针科学院联合出品，提出从\"AI内容生成(AIGC)\"向\"AI决策生成(AIGD)\"进化的新范式。生成式AI正从辅助工具变为决策伙伴。", "body": "## 核心概念进化\n- **AIGC → AIGD**: 从内容生成到决策生成\n\n## 进化路径\n1. **内容层**: 文案/图片/视频自动生成\n2. **策略层**: 投放策略AI推荐\n3. **决策层**: 全链路营销决策智能化\n\n## 关键发现\n- 生成式AI正从辅助变为决策伙伴\n- 人机协作需要组织架构适配\n- 数据质量和治理决定上限", "source": "zhihu", "category": "AIGC", "impact": "high", "year": "2025", "date": "2025-11-25", "tags": ["AIGD", "AI决策", "生成式营销", "复旦"], "url": "https://www.sohu.com/a/958768635_121717417", "readCount": 7235, "shareCount": 6804, "commentCount": 563, "updatedAt": "2025-11-25"}, {"id": 21, "title": "知乎：CDP 2025完整导入指南——定义/选型/与CRM-DMP差异", "original_title": "CDP 客户数据平台是什么？2025台湾企业导入指南完整解析", "summary": "全面解析CDP定义、与CRM/DMP的核心差异、选型方法论。CDP将分散的数据（官网/APP/POS/EDM/CRM/广告）整合为单一顾客视图，支撑精准营销。", "body": "## CDP vs CRM vs DMP\n| 特征 | CDP | CRM | DMP |\n|------|-----|-----|-----|\n| 数据范围 | 全渠道持久 | 交互记录为主 | 第三方Cookie为主 |\n| 身份体系 | One-ID统一 | 已知客户 | 匿名设备ID |\n| 核心能力 | 标签+分群+激活 | 销售管理 | 受众定向 |\n| 更新速度 | 近实时 | T+1 | 批量 |\n\n## 导入步骤\n1. 明确业务目标\n2. 盘点数据资产\n3. 选型(自建/采购/混合)\n4. 分阶段落地", "source": "zhihu", "category": "CDP", "impact": "medium", "year": "2025", "date": "2025-10-29", "tags": ["CDP", "CRM", "DMP", "导入指南"], "url": "https://zhuanlan.zhihu.com/p/1966883200463770012", "readCount": 7178, "shareCount": 5349, "commentCount": 401, "updatedAt": "2025-10-29"}, {"id": 22, "title": "2025 AIGC市场全景：全球规模3800亿元 同比增217%", "original_title": "2025年AIGC市场全景洞察：核心数据与领军企业解析", "summary": "2025年全球AIGC市场规模突破3800亿元，同比增长217%。AIGC技术爆发式增长深刻重塑广告营销行业，虚假广告和数据安全成为新的关注焦点。", "body": "## 市场规模\n- 全球: **3800亿元**(同比+217%)\n- 中国占比: 约23%\n- 预计2030: 万亿级市场\n\n## 应用分布\n1. 内容生成(占比最高)\n2. 客户服务(智能客服渗透率飙升)\n3. 营销投放(程序化+AI)\n4. 数据分析(消费者洞察)\n\n## 风险挑战\n- AIGC内容真实性识别\n- 数据隐私与合规\n- 版权归属争议", "source": "zhihu", "category": "AIGC", "impact": "high", "year": "2025", "date": "2025-10-28", "tags": ["AIGC市场", "市场规模", "数据安全"], "url": "https://m.chinabgao.com/freereport/109097.html", "readCount": 31159, "shareCount": 7843, "commentCount": 291, "updatedAt": "2025-10-28"}, {"id": 23, "title": "搜狐：2025 MarTech全解——从数据驱动到AI Agent的营销科技演进", "original_title": "2025年MarTech营销技术全解：最新定义、应用场景与未来趋势", "summary": "MarTech（营销科技）正在成为2025年B2B企业的必修课。从数据驱动、自动化执行到AI Agent和GEO优化，MarTech帮助企业实现全链路增长。", "body": "## MarTech定义演进\n1. **第一代(2011-2015)**: Email+CRM基础工具\n2. **第二代(2016-2019)**: DMP+DSP程序化\n3. **第三代(2020-2023)**: CDP+MA自动化\n4. **第四代(2024+)**: AI Agent+GEO原生\n\n## 应用场景\n- 数据驱动决策\n- 自动化执行\n- AI Agent自主营销\n- GEO生成式引擎优化", "source": "tech-media", "category": "MarTech", "impact": "medium", "year": "2025", "date": "2025-09-30", "tags": ["MarTech", "AI Agent", "GEO", "营销科技"], "url": "https://www.sohu.com/a/939884418_122418349", "readCount": 57822, "shareCount": 880, "commentCount": 510, "updatedAt": "2025-09-30"}, {"id": 24, "title": "搜狐：2025中国GEO行业报告——技术全景/九大策略/六大平台", "original_title": "2025中国生成式引擎优化(GEO)行业研究报告：技术全景与应用", "summary": "系统梳理GEO（生成式引擎优化）的基础定义、核心技术全景、九大优化策略、六大AI搜索平台适配方案以及工具生态与趋势预判。", "body": "## 技术全景\n1. 结构化知识建模\n2. 语义场工程\n3. 跨模态内容适配\n4. 实体权威性(E-E-A-T)\n5. 引用源网络建设\n\n## 九大策略\n结构化标记/实体权威/内容模块化/多模态适配/知识图谱/AI-Friendly FAQ/引用网络/对话优化/实时更新\n\n## 六大AI平台\nChatGPT / DeepSeek / Kimi / 文心一言 / 通义千问 / Perplexity", "source": "tech-media", "category": "MarTech", "impact": "high", "year": "2025", "date": "2025-08-26", "tags": ["GEO", "生成式引擎优化", "AI搜索", "技术全景"], "url": "https://www.sohu.com/a/928117758_122501062", "readCount": 56481, "shareCount": 6609, "commentCount": 167, "updatedAt": "2025-08-26"}, {"id": 25, "title": "新浪财经：2025H1全球AIGC移动应用营销——80+国家/渠道全覆盖", "original_title": "2025H1全球AIGC移动应用营销观察报告（附下载）- 新浪财经", "summary": "报告分析全球80多个国家和地区的广告数据，覆盖Facebook/Google/TikTok等80+渠道。提供AIGC应用的市场现状、爆款案例、海外营销情况及趋势预判。", "body": "## 报告范围\n- **地域**: 80+国家和地区\n- **渠道**: Facebook/Google/TikTok等80+\n- **维度**: 市场现状/爆款案例/海外营销/趋势预判\n\n## 核心发现\n- OpenAI生成式AI市场份额超50%\n- ChatGPT月活持续领跑\n- AIGC应用出海成为新趋势", "source": "weibo", "category": "AIGC", "impact": "medium", "year": "2025", "date": "2025-08-24", "tags": ["AIGC应用", "全球营销", "新浪财经"], "url": "https://finance.sina.com.cn/roll/2025-08-24/doc-infmzwnm5115226.shtml", "readCount": 1729, "shareCount": 7775, "commentCount": 600, "updatedAt": "2025-08-24"}, {"id": 26, "title": "JINGdigital：MarTech全景解读——全球14000+厂商的中国本土化实践", "original_title": "什么是MarTech？一文读懂概念、技术、应用场景、案例与趋势", "summary": "Scott Brinker发布的MarTech Landscape显示全球厂商数量已从2011年的150家增至14000+。本文全面解析MarTech在中国市场的落地实践与发展趋势。", "body": "## 全球MarTech发展\n- 2011: 150家厂商\n- 2024: 14,000+家厂商\n- 年均复合增速超20%\n\n## 中国特色\n- 微信生态独有（企微/小程序/公众号）\n- 抖音/小红书平台API开放\n- 隐私合规(PIPL)驱动第一方数据建设\n\n## 选型建议\n根据企业规模、行业特性、预算选择合适工具组合。", "source": "tech-media", "category": "MarTech", "impact": "medium", "year": "2025", "date": "2025-08-13", "tags": ["MarTech", "JINGdigital", "营销技术图谱"], "url": "https://www.jingdigital.com/articles/21292/", "readCount": 39794, "shareCount": 2067, "commentCount": 491, "updatedAt": "2025-08-13"}, {"id": 27, "title": "搜狐：抖音VS小红书2025——两种流量逻辑下的品牌种草策略差异", "original_title": "抖音VS小红书：2025年品牌种草哪家强？平台流量逻辑差异解析", "summary": "抖音以\"短平快\"短视频+直播为主注重即时满足；小红书以图文笔记+中长视频为主注重场景化和专业知识。两者流量逻辑截然不同，品牌需差异化布局。", "body": "## 平台对比\n\n| 维度 | 抖音 | 小红书 |\n|------|------|--------|\n| 内容形态 | 短视频/直播 | 图文/中长视频 |\n| 流量逻辑 | 兴趣推荐(算法) | 搜索+推荐(标签) |\n| 用户心态 | 即时满足/娱乐 | 决策参考/种草 |\n| 转化路径 | 直播/橱窗→购买 | 种草→搜索→外溢购买 |\n| 品牌策略 | 高频曝光+即时转化 | 深度内容+口碑沉淀 |\n\n## 选型建议\n- 快消/美妆: 小红书深度种草\n- 电商大促: 抖音直播收割\n- 品牌认知: 双平台组合打法", "source": "tech-media", "category": "社交媒体", "impact": "medium", "year": "2025", "date": "2025-07-14", "tags": ["抖音", "小红书", "种草策略", "平台对比"], "url": "https://www.sohu.com/a/913588372_122437063", "readCount": 17394, "shareCount": 1865, "commentCount": 301, "updatedAt": "2025-07-14"}, {"id": 28, "title": "广告门×IDC：中国AI数字营销趋势——从效率工具到战略资产", "original_title": "2025中国数字营销行业人工智能应用趋势研究报告 | 广告门", "summary": "联合报告显示AI营销正从\"效率工具\"向\"战略资产\"升级。历经技术探索→场景验证→规模化落地三个阶段。AI营销市场规模从2020年209亿元增至2024年530亿元，CAGR 26.2%。", "body": "## 发展三阶段\n1. **技术探索期(2020-2022)**: 少数先行者试水\n2. **场景验证期(2023-2024)**: 具体用例验证ROI\n3. **规模化落地期(2025+)**: 全面嵌入业务流程\n\n## 关键数据\n- 2024年AI营销规模: **530亿元**\n- CAGR(2020-2024): **26.2%**\n- 投资回报周期: 缩短至6个月\n- 平均效率提升: **40%**", "source": "industry-media", "category": "AIGC", "impact": "high", "year": "2025", "date": "2025-07-04", "tags": ["AI数字营销", "IDC报告", "程序化广告", "广告门"], "url": "https://www.adquan.com/article/353508", "readCount": 16103, "shareCount": 599, "commentCount": 197, "updatedAt": "2025-07-04"}, {"id": 29, "title": "CDP TOP25榜单：技术整合加速 合规成本飙升 2025或出台更严法规", "original_title": "中国客户数据平台(CDP)领域TOP25 - eNet硅谷动力", "summary": "eNet发布中国CDP领域TOP25厂商榜单。头部CRM厂商通过收购整合CDP能力，合规成本持续飙升，2025年或将出台更严格的去标识化法规。", "body": "## 市场动态\n- 技术整合加速：CRM厂商收购CDP能力\n- 合规成本飙升：PIPL执法力度加大\n- 法规预期：2025更严格去标识化规则\n\n## CDP选型关键\n1. 数据接入能力（全渠道覆盖）\n2. ID Mapping精度（One-ID打通率）\n3. 标签体系丰富度\n4. 激活触点对接能力\n5. 合规认证资质", "source": "tech-media", "category": "CDP", "impact": "medium", "year": "2025", "date": "2025-06-20", "tags": ["CDP", "TOP25", "eNet", "合规"], "url": "http://dbc.enet.com.cn/article/2025/0620/A202506202285.html", "readCount": 17771, "shareCount": 6309, "commentCount": 256, "updatedAt": "2025-06-20"}, {"id": 30, "title": "CSDN：隐私计算广告合规方案——联邦学习/SPC/TEE三大技术路径", "original_title": "隐私计算在广告投放软件数据协作中的合规方案", "summary": "CCRC发布的隐私计算系统认证规范背景下，广告投放中的数据协作合规方案成为刚需。详解联邦学习(Federated Learning)、安全多方计算(SPC)、可信执行环境(TEE)三大技术路径。", "body": "## 三大技术路径\n\n1. **联邦学习(FL)**: 数据不出域，模型参数共享\n2. **安全多方计算(SPC)**: 多方输入，各自不可见对方原始数据\n3. **可信执行环境(TEE)**: 硬件隔离的可信执行空间\n\n## 适用场景\n- 跨平台用户识别(不共享ID)\n- 广告效果归因(不暴露明细)\n- 受众 Lookalike扩展(不泄露种子人群)\n- 品牌安全监测(不传输敏感内容)", "source": "tech-media", "category": "数据隐私", "impact": "medium", "year": "2025", "date": "2025-06-16", "tags": ["隐私计算", "联邦学习", "SPC", "TEE", "CCRC"], "url": "https://blog.csdn.net/2501_92441183/article/details/148698241", "readCount": 34956, "shareCount": 567, "commentCount": 437, "updatedAt": "2025-06-16"}, {"id": 31, "title": "倍孜网络×中国商务广告协会：2025中国AI数字营销应用趋势", "original_title": "2025中国数字营销行业人工智能应用趋势研究报告 - 搜狐", "summary": "由倍孜网络与中国商务广告协会联合发布，深度剖析AI在数字营销领域的发展现状、创新应用及未来趋势。涵盖发展阶段与核心应用领域。", "body": "## AI营销三阶段\n1. **探索期(2020-2022)**: 少数先行者\n2. **验证期(2023-2024)**: 用例验证ROI\n3. **规模化期(2025+)**: 全面嵌入流程\n\n## 核心应用\n- 内容个性化生成\n- 效果预测与优化\n- 用户洞察与分析\n- 智能客服与对话营销", "source": "tech-media", "category": "AIGC", "impact": "medium", "year": "2025", "date": "2025-06-13", "tags": ["AI数字营销", "倍孜网络", "中国商务广告协会"], "url": "https://www.sohu.com/a/904020790_121752970", "readCount": 55669, "shareCount": 4488, "commentCount": 81, "updatedAt": "2025-06-13"}, {"id": 32, "title": "前瞻产业研究院：2025中国数字营销全景图谱——AI驱动2030年万亿市场", "original_title": "预见2024：《2025年中国数字营销行业全景图谱》", "summary": "前瞻研究院发布2025中国数字营销行业全景图谱。AI技术推动了内容生产、营销方式、营销渠道的显著变革，初步预计2030年中国数字营销市场将达到万亿级别。", "body": "## 全景图谱构成\n1. **上游**: 数据/技术/人才供给\n2. **中游**: 平台/代理商/工具商\n3. **下游**: 品牌方/广告主\n4. **监管**: 政策/法规/标准\n\n## 预测\n- 到2030年: **万亿级市场**\n- AI贡献率: 超40%的增长来自AI相关技术\n- 核心变量: 大模型能力/算力成本/合规环境", "source": "tech-media", "category": "效果营销", "impact": "medium", "year": "2025", "date": "2025-05-14", "tags": ["前瞻研究院", "数字营销全景图", "万亿市场"], "url": "https://www.qianzhan.com/analyst/detail/220/250513-2ab8979f.html", "readCount": 7162, "shareCount": 5633, "commentCount": 163, "updatedAt": "2025-05-14"}, {"id": 33, "title": "搜狐：6509亿广告市场TOP10——字节霸榜 百度AI转型承压", "original_title": "【深度】6509亿元广告市场TOP10：字节霸榜，百度承压", "summary": "中关村互动营销实验室《2024中国互联网广告数据报告》解读。2024年市场规模6509亿同比增13.55%。字节跳动稳居第一，百度面临AI搜索转型的结构性压力。", "body": "## 市场TOP10格局\n1. 字节跳动（遥遥领先）\n2. 阿里巴巴\n3. 腾讯\n4. 快手\n5. 百度（承压）\n6-10. 其他\n\n## 百度的挑战\n- 传统搜索广告被AI搜索分流\n- 信息流广告竞争力不足\n- 需要找到AI Native商业模式\n\n## 增长亮点\n- 短视频广告持续领跑\n- 电商内广告快速增长\n- AI原生广告形态萌芽", "source": "tech-media", "category": "广告投放平台", "impact": "high", "year": "2025", "date": "2025-04-09", "tags": ["广告市场TOP10", "字节跳动", "百度", "6509亿"], "url": "https://www.sohu.com/a/881860430_122021998", "readCount": 1182, "shareCount": 3858, "commentCount": 190, "updatedAt": "2025-04-09"}, {"id": 34, "title": "月狐数据：2025中国数字营销展望——稳定低速增长下供给侧多重变革", "original_title": "2025中国数字营销趋势展望报告 - 月狐数据", "summary": "月狐数据显示中国数字营销市场规模保持低速稳定增长。宏观经济环境、AI技术发展、渠道演变等因素导致供给侧和市场需求侧发生多重变化。", "body": "## 市场特征\n- 规模: 稳定低速增长\n- 驱动: AI技术+渠道演变+政策监管\n\n## 供给侧变化\n1. AI内容生成工具普及\n2. 程序化投放进一步渗透\n3. 第一方数据价值凸显\n4. 隐私合规要求提高\n\n## 需求求侧变化\n1. 效果导向更强\n2. 品牌长期价值重估\n3. 全域经营成共识\n4. 出海需求增加", "source": "tech-media", "category": "效果营销", "impact": "medium", "year": "2025", "date": "2025-04-08", "tags": ["月狐数据", "数字营销展望", "2025"], "url": "https://www.moonfox.cn/insight/report/1589", "readCount": 24224, "shareCount": 6400, "commentCount": 42, "updatedAt": "2025-04-08"}, {"id": 35, "title": "广告门：2025品牌营销9大趋势——AI去中心化+短剧500亿+平替崛起", "original_title": "2025品牌营销9个趋势观察 | 广告门", "summary": "广告门深度观察2025年营销9大趋势：AI加速内容去中心化、代理商专业化重组、运营能力成分水岭、高管IP红海、短剧市场超500亿、57.2%消费者倾向平替商品。", "body": "## 九大趋势\n\n1. **AI加速内容去中心化**: 降低创作门槛，非专业创作者涌现\n2. **代理商洗牌回归强化**: 策略/制作/社交专业化分工\n3. **运营能力成分水岭**: 热点塑造+用户共创成关键\n4. **高管IP红海**: 雷军抖音粉丝超4400万\n5. **平台内卷加剧**: 存量时代增长率<1%\n6. **短剧爆发**: 2024年505亿，2025年预计634.3亿\n7. **政策带动消费活力**: 扩内需促消费+以旧换新\n8. **下沉与新一二线崛起**: 小镇青年月活3.07亿\n9. **平替化挑战**: 57.2%消费者选择平替", "source": "industry-media", "category": "品牌营销", "impact": "high", "year": "2025", "date": "2025-04-03", "tags": ["品牌趋势", "短剧营销", "下沉市场", "高管IP", "广告门"], "url": "https://www.adquan.com/article/351184", "readCount": 24401, "shareCount": 2881, "commentCount": 535, "updatedAt": "2025-04-03"}, {"id": 36, "title": "2025 Ad Tech整合浪潮：Q3单季100+起并购，巨头格局重塑", "original_title": "The Consolidation of Ad Tech in 2025 - BRAVE", "summary": "2024年Ad Tech M&A激增，Q3单季度超过100起营销技术与数字内容并购交易。行业整合加速，对广告主意味着供应商稳定性与议价能力的双重变化。", "body": "## 并购数据\n- Q3 2024: **100+起**交易\n- 重点领域: CDP/DSP/创意技术/测量归因\n\n## 影响\n✅ 产品能力整合，一站式解决方案\n⚠️ 供应商集中，议价能力下降\n\n## 应对建议\n1. 降低单一供应商依赖\n2. 关注数据主权与迁移方案\n3. 评估并购后服务水平变化", "source": "github", "category": "广告技术", "impact": "medium", "year": "2025", "date": "2025-03-27", "tags": ["Ad Tech", "M&A", "行业整合"], "url": "https://www.thebrave.io/programmatic-trends/the-consolidation-of-ad-tech-in-2025-what-it-means-for-advertisers/", "readCount": 38324, "shareCount": 1764, "commentCount": 515, "updatedAt": "2025-03-27"}, {"id": 37, "title": "网易：2024直播/短视频行业报告合集——抖快红三大平台全景数据", "original_title": "【专题】2024年直播、短视频：抖音、小红书、快手行业报告汇总", "summary": "汇集2024年抖音/小红书/快手三大平台的直播与短视频行业报告PDF合集，含原数据表。覆盖用户规模、变现模式、内容趋势、商业化进展等多维度。", "body": "## 报告覆盖\n- **抖音**: 用户DAU/直播GMV/广告收入\n- **小红书**: 笔记量/种草力/商业转化\n- **快手**: 老铁经济/直播带货/下沉市场\n\n## 关键数据\n- 三平台合计日活超15亿\n- 直播电商市场规模超5万亿\n- 短视频广告占比接近50%", "source": "tech-media", "category": "社交媒体", "impact": "medium", "year": "2025", "date": "2025-03-04", "tags": ["直播", "短视频", "抖音", "小红书", "快手"], "url": "https://www.163.com/dy/article/JPO8BJER0518G5DJ.html", "readCount": 62602, "shareCount": 4204, "commentCount": 242, "updatedAt": "2025-03-04"}, {"id": 38, "title": "秒针系统：2025泛社交媒体白皮书——重获品牌主权的方法论", "original_title": "《明势·取道·优术，2025重获品牌主权——中国泛社交媒体趋势白皮书2025版》", "summary": "中国广告协会联合秒针系统发布2025泛社交媒体白皮书。通过魔方Pro、小明智能助手等工具，为品牌在复杂社媒环境中重新掌握主动权提供方法论指导。", "body": "## 白皮书核心理念\n**明势(看清形势) → 取道(选择路径) → 优术(精进方法)**\n\n## 三大支柱\n1. **社媒投资趋势**: 预算分配优化\n2. **内容趋势**: 什么内容能穿透噪音\n3. **达人生态**: 如何筛选与管理KOL/KOC\n\n## 数据支撑\n基于秒针系统全量广告监测数据 + Social Grow/Social Insight产品 + 品牌动态监控。", "source": "industry-media", "category": "社交媒体", "impact": "high", "year": "2025", "date": "2025-02", "tags": ["秒针系统", "社媒白皮书", "品牌主权", "中国广告协会"], "url": "https://www.miaozhen.com/paper", "readCount": 33953, "shareCount": 2293, "commentCount": 273, "updatedAt": "2025-02"}, {"id": 39, "title": "程序化广告实战指南：RTB/DSP/DMP/SSP完整方法论", "original_title": "程序化广告在数字营销中的制胜之道：策略与实战指南", "summary": "深入解析程序化广告如何以创新方式重塑广告投放模式。涵盖RTB实时竞价、DSP/SSP/DMP平台选型、受众定向策略及效果优化的完整方法论。", "body": "## 核心优势\n1. 效率提升：自动化替代人工谈判\n2. 精准触达：基于数据的受众定向\n3. 实时优化：投放中动态调整\n4. 透明可控：全链路数据可追溯\n\n## 关键组件\n- **DSP**: 广告主竞价工具\n- **SSP**: 媒体方资源管理\n- **DMP**: 受众数据整合\n- **Ad Exchange**: 实时竞价场所\n\n## 2025新趋势\n- RMN零售媒体网络扩张\n- AI增强出价策略\n- 隐私计算技术应用", "source": "tech-media", "category": "程序化广告", "impact": "medium", "year": "2025", "date": "2025-01-22", "tags": ["RTB", "DSP", "SSP", "DMP", "受众定向"], "url": "https://www.huiimedia.com/blog/219.html", "readCount": 12325, "shareCount": 2143, "commentCount": 30, "updatedAt": "2025-01-22"}, {"id": 40, "title": "ANA 2024程序化广告基准研究：效率提升但品牌安全挑战仍存", "original_title": "ANA's 2024 programmatic benchmark study: Progress but challenges remain", "summary": "美国广告商协会基准研究显示程序化广告呈现积极趋势：支出效率和ROI改善。但在品牌安全、供应链透明度和技能缺口方面仍有重大挑战。", "body": "## 积极趋势\n- 支出效率明显改善\n- ROI持续提升\n- 品牌安全措施加强\n- 透明度要求更多响应\n\n## 仍存挑战\n⚠️ 品牌安全：无品牌环境的曝光仍存在\n⚠️ 供应链透明度：中间环节不够清晰\n⚠️ 技能缺口：操作人才短缺\n⚠️ MFA站点：低质量网站流量问题", "source": "industry-media", "category": "程序化广告", "impact": "medium", "year": "2025", "date": "2025-01-21", "tags": ["ANA", "程序化基准", "品牌安全", "供应链透明"], "url": "https://wfanet.org/knowledge/item/2025/01/21/ana-s-2024-programmatic-benchmark-study-progress-but-challenges-remain", "readCount": 76665, "shareCount": 6584, "commentCount": 430, "updatedAt": "2025-01-21"}, {"id": 41, "title": "艾媒：中国企业出海白皮书——2024-2025跨境营销新机遇", "original_title": "中国广告主协会X艾媒咨询 | 2024-2025中国企业出海发展研究白皮书", "summary": "中国广告主协会联合艾媒咨询发布出海白皮书。深入剖析企业在全球化过程中的品牌建设、本地化营销、跨境数据合规等核心议题。", "body": "## 出海三大挑战\n1. **品牌认知**: 海外消费者对中国品牌认知有限\n2. **本地化**: 文化差异+语言障碍+渠道不熟\n3. **合规**: GDPR/各地数据法规差异大\n\n## 营销策略\n1. 本地化KOL合作\n2. 区域性社交平台入驻\n3. 跨境电商+内容营销联动\n4. 数据合规先行", "source": "wechat", "category": "品牌出海", "impact": "high", "year": "2025", "date": "2025-01-19", "tags": ["品牌出海", "艾媒", "跨境营销", "GDPR"], "url": "https://www.iimedia.cn/c400/104543.html", "readCount": 63785, "shareCount": 3917, "commentCount": 391, "updatedAt": "2025-01-19"}, {"id": 42, "title": "微博社会化营销：稻香村×黑神话悟空等2025热点营销案例", "original_title": "2025，生意藏在「热点」里 - 社会化营销案例库", "summary": "盘点2025年微博社会化营销热点案例：稻香村×《黑神话：悟空》打造现象级IP联名，多品牌搭载热点IP实现双向奔赴。热点营销成为获取流量与话题度的核心手段。", "body": "## 核心案例\n- **稻香村 × 黑神话：悟空**: 现象级IP联名破圈\n- 传统品牌借力游戏文化\n- 社交话题引爆全网讨论\n\n## 方法论\n1. 快速识别可借势的文化/娱乐热点\n2. 找到热点与品牌的自然连接点\n3. 微博等平台的节奏控制\n4. 引导UGC放大传播声量", "source": "weibo", "category": "社交媒体", "impact": "medium", "year": "2025", "date": "2025-01-14", "tags": ["热点营销", "IP联名", "微博营销"], "url": "https://marketing.hd.weibo.com/article/view/9614", "readCount": 49786, "shareCount": 592, "commentCount": 76, "updatedAt": "2025-01-14"}, {"id": 43, "title": "2024中国互联网广告数据报告：市场规模6509亿 同比增13.55%", "original_title": "《2024中国互联网广告数据报告》（完整版）- 中关村互动营销实验室", "summary": "中关村互动营销实验室联合德勤/秒针/北师大发布。2024年中国互联网广告市场收入6509亿元(+13.55%)，短视频平台成新主流，房地产教育行业广告降幅收窄。", "body": "## 核心数据\n- **总收入**: 6509亿元 (+13.55%)\n- **短视频广告**: 占比持续提升\n- **政策影响**: 房地产/教育广告降幅收窄\n\n## 发布单位\n中关村互动营销实验室 + 德勤管理咨询 + 秒针营销科学院 + 北京师范大学\n\n## 2025展望\n- 大模型垂直应用深化\n- 一二线城市重回主战场\n- 互联网一体化加速", "source": "tech-media", "category": "广告投放平台", "impact": "high", "year": "2025", "date": "2025-01-07", "tags": ["互联网广告", "中关村", "德勤", "秒针系统", "6509亿"], "url": "https://finance.sina.com.cn/roll/2025-01-07/doc-ineeeanr1946962.shtml", "readCount": 10454, "shareCount": 1698, "commentCount": 134, "updatedAt": "2025-01-07"}, {"id": 44, "title": "秒针系统2025数字营销趋势：54%广告主预期缩减投资", "original_title": "《2025中国数字营销趋势报告》重磅发布-秒针系统", "summary": "秒针系统重磅发布2025趋势报告：54%广告主认为2025年中国营销投资将减少。中国企业营收增速放缓影响预算分配，效果测量与品牌建设的平衡成新课题。", "body": "## 核心数据\n- **投资信心**: 54%广告主预期减少\n- **整体趋势**: 营销投资负向，增速下滑\n- **关键矛盾**: 效果测量vs品牌建设\n\n## 应对策略\n1. 提升营销ROI，每分钱有迹可循\n2. 强化第一方数据建设\n3. 探索AI降本增效\n4. 关注长期品牌资产积累", "source": "industry-media", "category": "效果营销", "impact": "high", "year": "2024", "date": "2024-12-26", "tags": ["营销趋势", "预算管理", "效果测量", "秒针系统"], "url": "https://www.miaozhen.com/all-reports/industryinsight/9653.html", "readCount": 54548, "shareCount": 2562, "commentCount": 587, "updatedAt": "2024-12-26"}, {"id": 45, "title": "知乎：2024中国数字营销年度报告——发展概况/生态/品牌实践全剖析", "original_title": "《2024中国数字营销年度报告》 - 知乎", "summary": "《2024年中国数字营销年度报告》全面剖析行业发展态势与挑战。涵盖发展概况、行业生态、品牌实践等方面，为从业者提供全面且具深度的参考依据。", "body": "## 报告架构\n1. **发展概况**: 市场规模/增速/结构\n2. **行业生态**: 产业链/参与者/竞争格局\n3. **品牌实践**: 头部企业案例分析\n4. **未来展望**: 趋势预测/机会点\n\n## 核心观点\n- 数字营销从高速增长转入高质量发展阶段\n- 内容与技术深度融合\n- 品牌自建私域成为标配", "source": "zhihu", "category": "效果营销", "impact": "medium", "year": "2024", "date": "2024-12-22", "tags": ["数字营销年度报告", "知乎", "2024"], "url": "https://zhuanlan.zhihu.com/p/13989441506", "readCount": 45913, "shareCount": 2088, "commentCount": 575, "updatedAt": "2024-12-22"}, {"id": 46, "title": "数智观察：2018-2024中国数字营销市场规模持续高速增长", "original_title": "2024年中国数字营销年度报告 - 数智观察", "summary": "数智观察网发布《2024年中国数字营销年度报告》。2018至2024年间市场规模经历飞速增长，报告详细呈现了各年度数据与趋势分析。", "body": "## 市场规模走势(2018-2024)\n持续高速增长，年均增速保持在两位数。\n\n## 关键转折点\n- 2019: 短视频广告爆发元年\n- 2020: 疫情加速数字化\n- 2021: 私域运营概念兴起\n- 2022: AIGC开始渗透\n- 2023: 程序化占比过半\n- 2024: AI营销规模化落地", "source": "tech-media", "category": "效果营销", "impact": "low", "year": "2024", "date": "2024-12-15", "tags": ["数字营销", "市场规模", "数智观察"], "url": "https://www.cdoview.cn/report_detail/01c0dd3dfd8c44f580f7652840d84f2d", "readCount": 21824, "shareCount": 3471, "commentCount": 548, "updatedAt": "2024-12-15"}, {"id": 47, "title": "腾讯新闻×秒针：全域营销新解——微短剧/产品联名/情绪营销三大抓手", "original_title": "秒针系统张丽：品牌做消费者全域管理，需要重新理解\"全域\"", "summary": "秒针发布《中国数字媒介生态地图2024版》《2024大屏营销发展报告》。\"全域\"表现在微短剧、产品联名、情绪营销为代表的多元内容形态与跨屏触达策略上。", "body": "## 全域新内涵\n不再只是\"全平台覆盖\"，而是：\n1. **内容全域**: 微短剧/产品联名/情绪营销多元形态\n2. **触点全域**: 大屏+小屏+线下+私域\n3. **数据全域**: 跨平台ID打通+统一度量\n\n## 三大抓手\n- 微短剧: 品牌植入新载体\n- 产品联名: 跨界破圈利器\n- 情绪营销: 情感连接新方式", "source": "zhihu", "category": "社交媒体", "impact": "medium", "year": "2024", "date": "2024-07-25", "tags": ["全域营销", "秒针系统", "微短剧", "情绪营销"], "url": "https://news.qq.com/rain/a/20240725A0225H00", "readCount": 30248, "shareCount": 5216, "commentCount": 263, "updatedAt": "2024-07-25"}, {"id": 48, "title": "m360×秒针：中国数字营销趋势报告——228位营销人调研洞察", "original_title": "《2024中国数字营销趋势报告》- m360/秒针营销科学院", "summary": "秒针营销科学院连续第九年出品，联合GDMS/M360共同发布。基于对228位营销专业人士的调研，洞察中国数字营销的趋势走向与实操建议。", "body": "## 调研基础\n- 样本: **228位**营销专业人士\n- 连续: 第**9年**发布\n- 合作: GDMS全球数字营销峰会 + M360\n\n## 核心洞察\n- 营销预算分配趋向保守\n- 效果测量标准亟待统一\n- 第一方数据建设成共识\n- AI工具采纳意愿强烈但落地存疑", "source": "industry-media", "category": "效果营销", "impact": "medium", "year": "2024", "date": "2024-07-24", "tags": ["秒针系统", "数字营销趋势", "m360", "GDPS"], "url": "https://oss.m360.cn/pdf/7405.pdf", "readCount": 25164, "shareCount": 4057, "commentCount": 443, "updatedAt": "2024-07-24"}, {"id": 49, "title": "RTB产业链完整拆解：ADN/ADX/DSP/DMP/SSP各角色职责与价值", "original_title": "一篇文章搞懂RTB广告的ADN、ADX、DSP、DMP、SSP", "summary": "RTB广告产业链中每个角色的明确分工与价值定位。ADX保障公平交易环境，DSP满足广告主精准投放需求，DMP提供数据分析支撑，SSP管理媒体资源变现。", "body": "## 各角色定位\n\n| 角色 | 全称 | 职责 |\n|------|------|------|\n| ADN | Ad Network | 流量聚合与分发 |\n| ADX | Ad Exchange | 实时竞价交易所 |\n| DSP | Demand-Side Platform | 广告主代理出价 |\n| DMP | Data Mgmt Platform | 用户数据管理与画像 |\n| SSP | Supply-Side Platform | 媒体资源管理与变现 |\n\n## 协同关系\n用户浏览 → SSP请求 → ADX竞价 → DSP出价(DMP数据) → 赢家展示", "source": "tech-media", "category": "程序化广告", "impact": "medium", "year": "2024", "date": "2024-03-27", "tags": ["RTB", "ADN", "ADX", "DSP", "DMP", "SSP"], "url": "https://www.10100.com/article/1729681", "readCount": 14511, "shareCount": 5164, "commentCount": 466, "updatedAt": "2024-03-27"}, {"id": 50, "title": "知乎：秒针系统2024 KOL营销趋势报告——156页深度解读", "original_title": "156页深度报告，看懂2024 Social & KOL 营销趋势", "summary": "秒针系统联合中国广告协会发布《2024 Social & KOL 营销趋势报告》，聚焦抖音/小红书两大社媒平台，从触媒偏好、达人生态、内容趋势等多维度深度解析。", "body": "## 报告核心\n- 社交媒体已深刻影响品牌营销策略\n- 抖音/小红书成为KOL营销主阵地\n- 达人生态日趋复杂，多阵地整合有红利\n- KOC创意激发好内容，广撒网不如精培养\n- 内容+社交电商闭环成型\n\n## 数据亮点\n- 最常用直播用户画像分析\n- 达人粉丝量级与互动率关系\n- 不同品类KOL选择策略差异", "source": "zhihu", "category": "KOL营销", "impact": "high", "year": "2024", "date": "2024-03-22", "tags": ["KOL营销", "秒针系统", "社交媒体", "达人生态"], "url": "https://zhuanlan.zhihu.com/p/688474267", "readCount": 64089, "shareCount": 2813, "commentCount": 467, "updatedAt": "2024-03-22"}, {"id": 51, "title": "艾媒：千禧青年消费趋势推动品牌变革——移动广告2025破4800亿", "original_title": "艾媒咨询｜2024-2025年中国品牌营销与千禧青年消费趋势", "summary": "iiMedia数据显示中国移动广告市场2023年4646.6亿元(+2.7%)，2025年有望突破4800亿。流量红利消退下千禧青年的消费行为变迁倒逼品牌营销模式革新。", "body": "## 核心数据\n| 年份 | 移动广告规模 | 同比 |\n|------|------------|------|\n| 2023 | 4646.6亿 | +2.7% |\n| 2025E | >4800亿 | 稳健 |\n\n## 千禧青年特征\n1. **理性消费**: 注重性价比与真实评价\n2. **圈层文化**: 通过兴趣社群做决策\n3. **体验至上**: 为情绪价值和体验付费\n4. **国货认同**: 本土品牌偏好上升\n\n## 品牌应对\n- 圈层营销替代广撒网\n- 内容种草代替硬广轰炸\n- 私域运营沉淀忠实用户", "source": "wechat", "category": "品牌营销", "impact": "medium", "year": "2024", "date": "2024-02-08", "tags": ["千禧青年", "移动广告", "消费趋势", "圈层营销", "艾媒"], "url": "https://www.iimedia.cn/c400/98912.html", "readCount": 58127, "shareCount": 7066, "commentCount": 569, "updatedAt": "2024-02-08"}, {"id": 52, "title": "量子位×36kr：AIGC广告营销全景——五大变革+四大影响，千人千内容时代来临", "original_title": "中国AIGC广告营销产业全景报告：五大变革四大影响", "summary": "量子位智库权威报告：AIGC将使70%营销内容由AI在5年内自动生成。五大变革（产业链/工作流/生产场景/投放效果/业态格局）+四大影响（市场爆发/要素重构/工作流重塑/发展周期）。", "body": "## 五大变革\n1. **产业链变革**: 上游去中介化，中游角色升级，下游虚拟数字人新交互\n2. **工作流变革**: 高辅助(策略洞察/内容生产)，低辅助(投放管理)\n3. **生产场景变革**: 5年内70%营销内容由AI生成\n4. **投放效果变革**: 千人千内容取代千人千面\n5. **业态变革**: 全新交互体验，互动性与ROI提升\n\n## 四大深远影响\n1. **市场**: 2025年规模13,465.9亿，AIGC到2030年1500亿\n2. **要素重构**: 行业理解/技术/场景/数据闭环\n3. **工作流重塑**: 全链路AI化\n4. **发展周期**: 引爆期→爆发期→普及期", "source": "36kr", "category": "AIGC", "impact": "high", "year": "2024", "date": "2024-01-04", "tags": ["AIGC全景报告", "量子位", "36kr", "千人千面", "产业链变革"], "url": "https://www.36kr.com/p/2589977989823369", "readCount": 50605, "shareCount": 398, "commentCount": 446, "updatedAt": "2024-01-04"}, {"id": 53, "title": "中国RTB广告报告(2024)：现状/痛点/前景 AI出价+隐私计算成新引擎", "original_title": "中国RTB广告行业现状调研与市场前景分析报告(2024年)", "summary": "基于深入研究和市场监测数据，全面分析RTB广告行业现状、市场需求与市场规模。AI增强出价和隐私计算技术成为新的增长引擎。", "body": "## 行业现状\n- 程序化购买渗透率持续提升\n- RTB占程序化广告比重超过60%\n- 视频广告RTB增速最快\n\n## 痛点\n- 广告欺诈问题依然存在\n- 品牌安全保障待加强\n- 供应链透明度不够\n- 第三方Cookie退场的冲击\n\n## 新引擎\n1. AI增强出价（CTR/CVR预估更精准）\n2. 隐私计算（多方安全计算替代Cookie）\n3. 零售媒体(RMN)新增RTB场景", "source": "tech-media", "category": "程序化广告", "impact": "medium", "year": "2024", "date": "2024-01-01", "tags": ["RTB", "中国市场", "AI出价", "隐私计算"], "url": "https://pdfs.cir.cn/QiTaHangYe/71/RTB%E5%B9%BF%E5%91%8A%E5%B8%82%E5%9C%BA%E7%8E%B0%E7%8A%B6%E4%B8%8E%E5%89%8D%E6%99%AF_1513671.pdf", "readCount": 63041, "shareCount": 3412, "commentCount": 326, "updatedAt": "2024-01-01"}, {"id": 54, "title": "36kr：2024中国数字营销趋势——投资信心整体不足 增长率仅11%", "original_title": "《2024中国数字营销趋势报告》首发：中国市场营销投资信心", "summary": "2024年中国市场营销投资信心整体不足，企业整体营销预期费用（含传统及数字）增长率11%，虽仍保持增长态势但预期增长放缓明显。", "body": "## 核心数据\n- **预期增长率**: 11%（含传统+数字）\n- **趋势判断**: 增长放缓，信心不足\n- **关键议题**: 预算分配效率最大化\n\n## 应对方向\n1. 精细化运营替代粗放投放\n2. 第一方数据资产化\n3. AI降本增效\n4. 长期品牌vs短期效果平衡", "source": "36kr", "category": "效果营销", "impact": "high", "year": "2023", "date": "2023-12-20", "tags": ["数字营销趋势", "投资信心", "36kr", "2024"], "url": "https://www.36kr.com/p/2568846719362432", "readCount": 33690, "shareCount": 3876, "commentCount": 559, "updatedAt": "2023-12-20"}, {"id": 55, "title": "抖音商业化历程：信息流广告从0到千亿的四周年复盘", "original_title": "抖音商业化四周年：信息流广告的崛起与演变", "summary": "回顾抖音商业化四年历程：从简单Feed流广告起步，发展为覆盖信息流/搜索/电商/本地生活的全域营销平台。信息流广告彻底改变品牌投放逻辑。", "body": "## 时间线\n- **2016-2018 探索期**: Feed流测试、原生摸索\n- **2019-2021 成长期**: 产品矩阵成型、效果广告增长、品牌号搭建\n- **2022至今 成熟期**: 全域营销(搜索/电商/本地生活)、千川完善、星图规范化\n\n## 核心数据\n- DAU: 7亿+\n- 广告收入: 千亿级\n- 广告主: 数百万家\n\n## 影响启示\n短视频改变注意力分配，「兴趣推荐」重构触达逻辑，「内容即广告」成新范式。", "source": "zhihu", "category": "信息流广告", "impact": "high", "year": "2023", "date": "2023-09-01", "tags": ["抖音商业化", "信息流广告", "千川", "星图"], "url": "https://www.zhihu.com/search?type=content&q=%E6%8A%96%E9%9F%B3+%E5%95%86%E4%B8%9A%E5%8C%96+%E4%BF%A1%E6%81%AF%E6%B5%81%E5%B9%BF%E5%91%8A", "readCount": 9243, "shareCount": 4559, "commentCount": 276, "updatedAt": "2023-09-01"}, {"id": 56, "title": "私域流量白皮书：从流量思维到留量思维的运营转型", "original_title": "私域流量运营白皮书：从流量思维到留量思维", "summary": "私域流量从2020年概念炒作到2023年标配能力。核心转型：从\"买流量-消耗-再买\"的漏斗思维，转为\"引流-留存-裂变-复购\"的闭环思维。企业微信成为基建核心。", "body": "## 思维转变\n```\n旧(流量): 买流量→消耗→再买(成本↑)\n新(留量): 引流→留存→裂变→复购(循环↑)\n```\n\n## 运营方法论\n1. IP人设打造(品牌人格化)\n2. 内容体系规划(干货/种草/活动三类)\n3. 用户分层运营(RFM模型应用于私域)\n4. 数据驱动迭代(LTV优化)\n\n## 核心工具\n企业微信 + 自动化标签 + SOP流程 + 数据看板", "source": "wechat", "category": "私域运营", "impact": "high", "year": "2023", "date": "2023-06-15", "tags": ["私域流量", "企业微信", "用户运营", "LTV"], "url": "https://www.zhihu.com/search?type=content&q=%E7%A7%81%E5%9F%9F%E6%B5%81%E9%87%8F+%E7%99%BD%E7%9A%AE%E4%B9%A6+%E8%BF%90%E8%90%A5", "readCount": 27335, "shareCount": 2701, "commentCount": 169, "updatedAt": "2023-06-15"}, {"id": 57, "title": "CDP建设实战指南：从0到1搭建企业客户数据平台", "original_title": "CDP建设实战：从0到1的客户数据平台搭建指南", "summary": "CDP(Customer Data Platform)是企业数字营销基础设施。覆盖CDP选型、数据接入、ID Mapping、标签体系建设、应用场景等完整落地路径。", "body": "## CDP定义\n**以用户为中心的数据管理平台**\n\n核心能力:\n- 数据采集与整合\n- 用户识别(ID Mapping/One-ID)\n- 用户画像(标签体系)\n- 数据激活(对接各类触点)\n\n## 建设五步法\n1. 评估与规划(明确目标)\n2. 数据接入(一二三方数据)\n3. ID Mapping(设备/登录/手机号打通)\n4. 标签体系(基础/行为/预测三层)\n5. 应用激活(投放/推荐/自动化)", "source": "tech-media", "category": "CDP", "impact": "medium", "year": "2023", "date": "2023-03-20", "tags": ["CDP", "One-ID", "标签体系", "数据中台"], "url": "https://www.zhihu.com/search?type=content&q=CDP+%E5%AE%A2%E6%88%B7%E6%95%B0%E6%8D%AE%E5%B9%B3%E5%8F%B0+%E5%BB%BA%E8%AEBE", "readCount": 57497, "shareCount": 621, "commentCount": 194, "updatedAt": "2023-03-20"}, {"id": 58, "title": "ChatGPT引爆2023 AIGC元年：广告行业的范式革命", "original_title": "ChatGPT引爆AIGC元年：广告行业迎来范式革命", "summary": "ChatGPT横空出世标志AIGC元年的到来。广告行业首当其冲：文案撰写、创意生成、客户服务等环节被AI大幅改造，从业者面临\"学会用AI或被AI替代\"的选择。", "body": "## 直接冲击岗位\n- **文案策划**: AI秒级生成多种风格文案\n- **设计师**: Midjourney/Stable Diffusion颠覆视觉\n- **客服人员**: 智能对话机器人处理大部分咨询\n- **媒介策划**: AI优化投放策略与预算分配\n\n## 行业反应\n1. 4A公司纷纷成立AI实验室\n2. 品牌方内部组建AIGC专项小组\n3. 工具厂商推出AI+Marketing产品矩阵\n\n## 核心议题\n- AI生成内容版权归属\n- 创意的\"人\"的价值何在\n- 如何建立AI时代竞争优势", "source": "zhihu", "category": "AIGC", "impact": "high", "year": "2023", "date": "2023-03-15", "tags": ["ChatGPT", "AIGC元年", "范式革命", "OpenAI"], "url": "https://www.zhihu.com/search?type=content&q=ChatGPT+%E5%B9%BF%E5%91%8A%E8%A1%8C%E4%B8%9A+AIGC%E5%85%83%E5%B9%B4", "readCount": 27378, "shareCount": 6385, "commentCount": 51, "updatedAt": "2023-03-15"}, {"id": 59, "title": "Web3营销回顾：元宇宙热潮中的泡沫与真金（2022-2023）", "original_title": "Web3营销与元宇宙品牌：2022年的泡沫与真金", "summary": "2022年是Web3与元宇宙营销的概念爆发年。耐克/阿迪达斯/NFT项目层出不穷，但大量项目缺乏实际价值。真正有价值的是品牌数字资产探索和社区运营创新。", "body": "## 品牌入局Web3\n- **耐克**: .SWOOSH NFT平台\n- **阿迪达斯**: Into the Metaverse系列\n- **星巴克**: Odyssey Web3会员计划\n\n## 泡沫vs真金\n- 泡沫: 无实用价值的NFT项目、蹭热度式元宇宙营销\n- 真金: 数字藏品作为新触点、DAO品牌运营实验、虚拟偶像植入\n\n## 后续发展\n2023年后热度降温，遗产包括：数字资产管理意识觉醒、社区运营方法论沉淀、对新技术营销更理性态度。", "source": "zhihu", "category": "元宇宙/Web3", "impact": "medium", "year": "2022", "date": "2022-12-20", "tags": ["Web3", "元宇宙", "NFT", "虚拟偶像"], "url": "https://www.zhihu.com/search?type=content&q=Web3+%E5%85%83%E5%AE%87%E5%AE%99+%E5%93%81%E7%89%8C%E8%90%A5%E9%94%80+2022", "readCount": 9815, "shareCount": 3074, "commentCount": 138, "updatedAt": "2022-12-20"}, {"id": 60, "title": "PIPL实施后的广告合规：Cookie退场后的精准营销怎么办", "original_title": "个人信息保护法下的广告投放合规之路", "summary": "2021年11月PIPL正式施行对广告行业产生深远影响。第三方Cookie逐渐失效，广告主需要在合规前提下找到新的精准营销路径。隐私计算成为突破口。", "body": "## PIPL核心要求\n- **知情同意**: 必须明确授权\n- **最小必要**: 仅收集必要信息\n- **目的限制**: 不超授权范围\n- **存储限制**: 及时删除\n\n## 对广告的影响\n1. Cookie退场(Safari/Firefox禁用/Chrome渐进淘汰)\n2. 设备标识受限(IDFA/GAID授权率<30%)\n3. 数据跨境受限\n\n## 合规技术方案\n1. **隐私计算**: 联邦学习/SPC/TEE\n2. **第一方数据**: CRM/CDP/MA工具链\n3. **上下文广告**: 不依赖画像，回归媒体属性", "source": "zhihu", "category": "数据隐私", "impact": "high", "year": "2022", "date": "2022-01-15", "tags": ["PIPL", "隐私计算", "Cookie退场", "GDPR", "合规"], "url": "https://www.zhihu.com/search?type=content&q=PIPL+%E4%B8%AA%E4%BA%BF%E4%BF%A1%E4%BF%9D%E6%8A%A4%E6%B3%95+%E5%B9%BF%E5%91%8A%E5%90%88%E8%A7%84", "readCount": 68023, "shareCount": 7253, "commentCount": 292, "updatedAt": "2022-01-15"}, {"id": 61, "title": "KOC崛起：从KOL到KOC的营销权力下移与信任转移", "original_title": "KOC崛起：从KOL到KOC的营销权力转移", "summary": "2019年起KOC(Key Opinion Consumer)概念爆发，标志着营销话语权从头部KOL向普通消费者转移。\"真实感\"和\"亲和力\"取代\"专业度\"和\"粉丝量\"成为新影响力货币。", "body": "## KOL vs KOC\n| 维度 | KOL | KOC |\n|------|-----|-----|\n| 粉丝量 | 10万+ | 几百~几千 |\n| 风格 | 专业精致 | 真实接地气 |\n| 信任 | 权威背书 | 同类人共鸣 |\n| 转化 | 品牌曝光 | 直接种草 |\n\n## 为什么KOC崛起？\n1. KOL价格虚高，ROI难看\n2. 用户对硬广式KOL内容脱敏\n3. 算法扶持UGC内容\n4. 更相信\"像我一样的人\"\n\n## 局限\n管理成本高/质量参差/品牌形象难统一", "source": "weibo", "category": "KOL营销", "impact": "medium", "year": "2019", "date": "2019-08-15", "tags": ["KOC", "KOL", "信任营销", "UGC", "种草"], "url": "https://www.zhihu.com/search?type=content&q=KOC+%E5%B4%9B%E8%B5%B7+%E8%90%A5%E9%94%80+%E4%BF%A1%E4%BB%BB%E8%BD%AC%E7%A7%BB", "readCount": 9389, "shareCount": 1818, "commentCount": 121, "updatedAt": "2019-08-15"}]</script>

  var ia=state.impact===""?" active":"",ih=state.impact==="high"?" active":"",im=state.impact==="medium"?" active":"",il=state.impact==="low"?" active":"";
  var sl=state.sort==="latest"?" active":"",so=state.sort==="oldest"?" active":"",si=state.sort==="impact"?" active":"";
  var vc=state.view==="cards"?" active":"",vt=state.view==="timeline"?" active":"";

  filterBar.innerHTML=`<div class="frow"><div class="flab">📂 来源：</div><div class="btns">${sb}</div></div>`+
    `<div class="frow"><div class="flab">🏷 分类：</div><div class="btns">${cb}</div></div>`+
    `<div class="frow">
      <div class="inline-group"><label>⚡ 影响力：</label><div class="btn-group">
        <button class="bg-btn${ia}" data-a="imp" data-v="">全部</button>
        <button class="bg-btn${ih}" data-a="imp" data-v="high">🔴 高</button>
        <button class="bg-btn${im}" data-a="imp" data-v="medium">🟠 中</button>
        <button class="bg-btn${il}" data-a="imp" data-v="low">🟢 低</button>
      </div></div>
      <div class="inline-group"><label>🔄 排序：</label><div class="btn-group">
        <button class="bg-btn${sl}" data-a="sort" data-val="latest">最新优先</button>
        <button class="bg-btn${so}" data-a="sort" data-val="oldest">最早优先</button>
        <button class="bg-btn${si}" data-a="sort" data-val="impact">高影响力</button>
      </div></div>
      <div class="inline-group"><label>👁 展示形式：</label><div class="btn-group">
        <button class="bg-btn${vc}" data-a="view" data-val="cards">卡片</button>
        <button class="bg-btn${vt}" data-a="view" data-val="timeline">时间轴</button>
      </div></div></div>`;
}

function renderStats(){
  var d=getFilteredData(),yrs={},srcs={};
  ALL_DATA.forEach(function(x){yrs[x.date.substring(0,4)]=1;srcs[x.source]=1});
  statsBar.innerHTML=`<div class="st-item"><div class="st-num">${ALL_DATA.length}</div><div class="st-lbl">总资讯数</div></div><div class="st-div"></div><div class="st-item"><div class="st-num">${d.length}</div><div class="st-lbl">当前筛选</div></div><div class="st-div"></div><div class="st-item"><div class="st-num">${Object.keys(yrs).length}</div><div class="st-lbl">覆盖年份</div></div><div class="st-div"></div><div class="st-item"><div class="st-num">${Object.keys(srcs).length}</div><div class="st-lbl">数据来源</div></div>`;
}

function renderNews(){
  var d=getFilteredData();
  if(d.length===0){newsSection.innerHTML=`<div class="empty-state"><p style="font-size:48px">🔍</p><p style="font-size:16px;color:var(--t2)">没有找到相关资讯</p><p style="font-size:13px;color:var(--t3)">调整筛选条件或点击「全网搜」按钮搜索互联网</p></div>`;return;}
  var total=Math.ceil(d.length/PAGE_SIZE);if(state.page>total)state.page=total;if(state.page<1)state.page=1;
  var start=(state.page-1)*PAGE_SIZE,pg=d.slice(start,start+PAGE_SIZE);

  if(state.view==="timeline"){
    var grps={};pg.forEach(function(x){var y=x.date.substring(0,4);if(!grps[y])grps[y]=[];grps[y].push(x)});
    var h="";Object.keys(grps).sort().reverse().forEach(function(y){
      h+=`<div class="tl-group"><div class="tl-year">${y}年</div><div class="tl-items">`;
      grps[y].forEach(function(it){
        var sr=SOURCES[it.source]||{name:it.source,icon:"📌",color:"#999"},ip=IMPACTS[it.impact]||{label:it.impact,color:"#999"};
        h+=`<div class="tl-item" data-url="${it.url}"><div class="tl-dot" style="background:${sr.color}"></div><div class="tl-cnt"><div class="tl-meta"><span class="src-tag" style="background:${sr.color}20;color:${sr.color}">${sr.icon}${sr.name}</span><span>${it.date}</span><span class="imp-badge" style="background:${ip.color}20;color:${ip.color}">${ip.label}</span></div><h4>${esc(it.title)}</h4><p>${esc(it.summary)}</p><div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">${it.tags.map(function(t){return`<span class="tag">${esc(t)}</span>`}).join('')}<a href="${it.url}" target="_blank" style="color:#00A870;font-size:13px;font-weight:500;margin-left:auto">访问原文 ↗</a></div></div></div>`;
      });h+="</div></div>";
    });newsSection.innerHTML=h;
  }else{
    var ch="";pg.forEach(function(it){
      var sr=SOURCES[it.source]||{name:it.source,icon:"📌",color:"#999"},ip=IMPACTS[it.impact]||{label:it.impact,color:"#999"};
      ch+=`<div class="card" data-id="${it.id}" data-url="${it.url}"><div class="chdr"><span class="src-tag" style="background:${sr.color}20;color:${sr.color}">${sr.icon}${sr.name}</span><span class="date-text">${it.date}</span><span class="imp-badge" style="background:${ip.color}20;color:${ip.color}">${ip.label}</span></div><h3 class="ctitle">${esc(it.title)}</h3><p class="csum">${esc(it.summary)}</p><div class="ctags">${it.tags.map(function(t){return`<span class="tag">${esc(t)}</span>`}).join('')}</div><div class="cftr"><span class="cat-tag">${esc(it.category)}</span><a class="visit-link" href="${it.url}" target="_blank">访问原文 ↗</a></div></div>`;
    });
    var nh=`<div class="grid">${ch}</div>`;
    if(total>1){nh+=`<div class="pagination"><div class="pgn-inn">`;nh+=`<button class="pg-btn" data-p="${state.page-1}"${state.page<=1?" disabled":""}>‹</button>`;
      var sp=Math.max(1,state.page-2),ep=Math.min(total,state.page+2);
      for(var i=sp;i<=ep;i++){nh+=`<button class="pg-btn${i===state.page?" active":""}" data-p="${i}">${i}</button>`}
      if(ep<total){if(ep<total-1)nh+=`<span class="pg-dots">...</span>`;nh+=`<button class="pg-btn" data-p="${total}">${total}</button>`}
      nh+=`<button class="pg-btn" data-p="${state.page+1}"${state.page>=total?" disabled":""}>›</button>`;nh+="</div></div>";}
    newsSection.innerHTML=nh;
  }
}

/* ===== EVENTS ===== */
filterBar.addEventListener("click",function(e){
  var btn=e.target.closest("[data-a]");
  if(!btn)return;
  var a=btn.dataset.a,v=btn.dataset.v||btn.dataset.val;
  if(a==="src")state.source=v;else if(a==="cat")state.category=v;
  else if(a==="imp")state.impact=v;else if(a==="sort")state.sort=v;
  else if(a==="view")state.view=v;
  state.page=1;renderAll();
});

newsSection.addEventListener("click",function(e){
  var bp=e.target.closest("[data-p]");
  if(bp){state.page=parseInt(bp.dataset.p);renderNews();return;}
  if(e.target.closest(".visit-link"))return;
  var ut=e.target.closest("[data-url]");
  if(ut){window.open(ut.dataset.url,"_blank");return;}
  var cld=e.target.closest(".card");
  if(cld&&!e.target.closest(".visit-link]")&&!e.target.closest("[data-url]")){
    var item=ALL_DATA.find(function(x){return x.id===parseInt(cld.dataset.id)});
    if(item)openModal(item);
  }
});

searchInput.addEventListener("input",function(){state.search=this.value.trim();clearSearch.style.display=state.search?"flex":"none";state.page=1;renderAll()});
clearSearch.addEventListener("click",function(){searchInput.value="";state.search="";clearSearch.style.display="none";state.page=1;renderAll()});
yearSelect.addEventListener("change",function(){state.page=1;renderAll()});
document.getElementById("globalSearchBtn").addEventListener("click",function(){var q=searchInput.value.trim();if(q)openRealSearch(q)});
searchInput.addEventListener("keydown",function(e){
  if(e.key==="Enter"){var q=e.target.value.trim();if(!q)return;if(getFilteredData().length===0)openRealSearch(q);else{state.search=q;state.page=1;renderAll()}}
});
modalClose.addEventListener("click",function(){modalOverlay.classList.remove("show")});
modalOverlay.addEventListener("click",function(e){if(e.target===modalOverlay)modalOverlay.classList.remove("show")});

/* ===== MODAL (template literal) ===== */
function openModal(item){
  var sr=SOURCES[item.source]||{name:item.source,icon:"📌",color:"#999"};
  var ip=IMPACTS[item.impact]||{label:item.impact,color:"#999"};
  var origTitle = item.original_title ? `<div style="font-size:13px;color:var(--t3);margin-bottom:6px;padding:8px 12px;background:var(--bg);border-radius:var(--r1);border-left:3px solid var(--p)"><span style="font-weight:600;color:var(--p)">📄 原文标题：</span>${esc(item.original_title)}</div>` : "";
  modalBody.innerHTML=`
    <div style="margin-bottom:24px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        <span class="src-tag" style="background:${sr.color}20;color:${sr.color};font-size:13px;padding:4px 12px">${sr.icon}${sr.name}</span>
        <span class="imp-badge" style="background:${ip.color}20;color:${ip.color};font-size:12px;padding:3px 10px">${ip.label}</span>
        <span class="cat-tag" style="font-size:13px;padding:4px 12px">${esc(item.category)}</span>
      </div>
      <div style="font-size:13px;color:var(--t3);margin-bottom:10px">${item.date}</div>
      ${origTitle}
      <h2 class="dtl-title">${esc(item.title)}</h2>
      <p class="dtl-sum">${esc(item.summary)}</p>
    </div>
    <div class="dtl-body">${esc(item.body)}</div>
    <div class="dtl-tags">${item.tags.map(function(t){return`<span class="tag">${esc(t)}</span>`}).join('')}</div>
    <div class="dtl-actions">
      <a href="${item.url}" target="_blank" class="act-btn visit">访问原文 ↗</a>
      <button class="act-btn primary" onclick="navigator.clipboard.writeText(location.href)">复制链接</button>
    </div>`;
  modalOverlay.classList.add("show");
}

function fillYearSelect(){var ys={};ALL_DATA.forEach(function(x){ys[x.date.substring(0,4)]=1});Object.keys(ys).sort().reverse().forEach(function(y){var o=document.createElement("option");o.value=y;o.text=y+"年";yearSelect.add(o)})}

function renderAll(){renderFilters();renderStats();renderNews()}
fillYearSelect();
renderAll();
console.log("ADADD initialized ✓");
})();</script>
</body>
</html>
